version: '3.8'

services:
  # HOT TIER - Primary MinIO Cluster
  minio-hot:
    image: quay.io/minio/minio:latest
    container_name: minio-hot
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-hot-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - iceberg-net

  # COLD TIER - Remote Tier MinIO Cluster
  minio-cold:
    image: quay.io/minio/minio:latest
    container_name: minio-cold
    ports:
      - "9100:9000"  # API
      - "9101:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-cold-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - iceberg-net

  # MinIO Client for configuration
  minio-mc:
    image: quay.io/minio/mc:latest
    container_name: minio-mc
    depends_on:
      - minio-hot
      - minio-cold
    entrypoint: /bin/sh
    command: -c "sleep infinity"
    volumes:
      - ./scripts:/scripts
    networks:
      - iceberg-net

  # Spark Master with Iceberg support
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master
      - "4040:4040"  # Spark Application UI
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./jars:/opt/spark/jars/custom
      - ./scripts:/scripts
      - ./data:/data
      - ./spark-config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - iceberg-net

  # Spark Worker
  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./jars:/opt/spark/jars/custom
      - ./scripts:/scripts
      - ./data:/data
      - ./spark-config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - iceberg-net

networks:
  iceberg-net:
    driver: bridge

volumes:
  minio-hot-data:
  minio-cold-data:

